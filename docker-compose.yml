services:
  shorts-pulse:
    build:
      context: ./shorts-pulse
      dockerfile: Dockerfile
    ports:
      - "9002:9002"
    restart: unless-stopped

  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    volumes:
      - ./analytics/secrets:/app/secrets:ro
      - ./analytics/data:/app/data
    profiles:
      - analytics
